# =============================================================================
# vhost TBS Digital — tbs.md
# Destinație pe server: /root/nginx-proxy/conf.d/tbs.conf
#
# ATENȚIE: acest fișier ÎNLOCUIEȘTE vhost-ul existent tbs.conf, care servește
# DocuSafe pe apex. Se copiază DOAR după ce DocuSafe rulează pe docusafe.tbs.md
# (Etapa A). Fă backup înainte de copiere — vezi docs/12-deployment.md.
#
# Reload:  docker exec nginx_proxy nginx -t && docker exec nginx_proxy nginx -s reload
# =============================================================================

server {
    listen 80;
    server_name tbs.md www.tbs.md;

    # Webroot pentru challenge-ul Let's Encrypt. Rămâne pe :80 și după emitere —
    # `certbot renew` are nevoie de el la fiecare reînnoire.
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    http2 on;
    server_name tbs.md www.tbs.md;

    ssl_certificate     /etc/letsencrypt/live/tbs.md/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tbs.md/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    server_tokens off;

    # Singurul header de securitate pe care îl emite proxy-ul. Restul (CSP,
    # X-Frame-Options, nosniff, Referrer-Policy) vin din next.config.ts — dacă
    # le-am adăuga și aici, browserul ar primi două CSP-uri și ar aplica
    # intersecția lor. HSTS ține de TLS, pe care îl termină proxy-ul, iar
    # domeniul îl trimitea deja: a-l scoate ar fi o regresie.
    #
    # NB: NU copia CSP-ul vechiului vhost DocuSafe (`default-src 'self'`) —
    # ar bloca pixelul de analytics de pe statistica.tbs.md.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Backend-ul respinge orice corp de request peste 1 MB (MAX_BODY_BYTES în
    # backend/app/main.py). Oprim la fel de devreme și în proxy, ca un upload
    # mare să primească 413 aici, fără să traverseze rețeaua până la uvicorn.
    client_max_body_size 1m;

    # DNS-ul intern Docker: rezolvă numele containerelor la fiecare request, ca
    # un `compose up` care le recreează cu IP nou să nu lase proxy-ul pe 502.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $front http://tbs-digital-frontend:3000;
    set $back  http://tbs-digital-backend:8000;

    # ---- Moștenire DocuSafe -------------------------------------------------
    # Domeniul a servit DocuSafe până la mutarea pe docusafe.tbs.md. Link-urile
    # și clienții vechi încă lovesc apexul, așa că le dăm 301 către noua casă în
    # loc de 404. Redirecționăm DOAR prefixele fără echivoc DocuSafe: un redirect
    # pe tot /api/ ar rupe backendul TBS Digital, care stă exact acolo.
    #
    # `^~` nu e strict necesar cât timp nu există location-uri regex: nginx alege
    # oricum prefixul cel mai lung, deci /api/v1/ bate /api/. Îl punem ca plasă de
    # siguranță — dacă cineva adaugă mai târziu un `location ~ ^/api/`, regex-ul
    # ar câștiga în fața prefixului simplu și ar trimite rutele DocuSafe în $back.
    # $request_uri păstrează path-ul + query-string-ul intacte, deci apelurile
    # vechi ajung 1:1 pe subdomeniu.
    location ^~ /api/v1/ {
        return 301 https://docusafe.tbs.md$request_uri;
    }

    # ONLYOFFICE DocServer — rulează lângă DocuSafe, deci se mută odată cu el.
    location /onlyoffice/ {
        return 301 https://docusafe.tbs.md$request_uri;
    }
    # -------------------------------------------------------------------------

    # Încărcarea de imagini din admin are propriul plafon (10 MB): backendul o acceptă
    # (MAX_UPLOAD_BODY_BYTES în main.py) și o comprimă. Fără acest bloc, plafonul global
    # de 1 MB de mai sus ar tăia o poză reală de pe telefon cu 413 chiar la proxy.
    # `^~` prinde acest prefix înaintea `/api/` de mai jos.
    location ^~ /api/admin/uploads {
        client_max_body_size 10m;
        proxy_pass $back;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        # Nu divulga stiva din spate (uvicorn) în răspunsuri.
        proxy_hide_header Server;
        proxy_hide_header X-Powered-By;
    }

    # Toate rutele FastAPI stau sub /api/ (auth, content, contact), deci un
    # singur prefix le acoperă. Ținându-le pe aceeași origine cu frontend-ul,
    # browserul nu face request-uri cross-origin și CORS nu intră în joc.
    location /api/ {
        proxy_pass $back;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        # Nu divulga stiva din spate (uvicorn / X-Powered-By) în răspunsuri.
        proxy_hide_header Server;
        proxy_hide_header X-Powered-By;
    }

    location / {
        proxy_pass $front;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_hide_header X-Powered-By;
    }
}
