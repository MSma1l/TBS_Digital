# TBS Digital — full stack: Postgres + FastAPI backend + Next.js frontend.
#
# All config comes from the root .env (copy .env.example -> .env, fill it in).
# Bring everything up with:  make up   (== docker compose up -d --build)
#
# ---------------------------------------------------------------------------
# IMPORTANT — two different backend URLs:
#   * INSIDE the compose network the backend is reachable at http://backend:8000
#     (Docker service DNS). Use this for server-to-server calls.
#   * The BROWSER runs on the user's machine, NOT inside the network, so it can
#     only reach the backend via the host-published port. That is why
#     NEXT_PUBLIC_API_URL (baked into the client bundle at build time) must be
#     the HOST-facing URL, e.g. http://localhost:8000 in dev or https://api.your-domain
#     in production — never http://backend:8000.
# ---------------------------------------------------------------------------

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      # Exposed for local inspection (psql). Remove/limit in production.
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME}
      # "development" | "production" — production turns on the fail-fast config guard.
      ENVIRONMENT: ${ENVIRONMENT:-development}
      # Connects to the db service over the compose network (host = "db").
      DATABASE_URL: ${DATABASE_URL}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
      CORS_ORIGINS: ${CORS_ORIGINS}
      DATA_DIR: ${DATA_DIR:-/app/data}
      # Telegram lead-notification bot (values come from the root .env).
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_GROUP_CHAT_ID: ${TELEGRAM_GROUP_CHAT_ID:-}
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-true}
      TELEGRAM_ADMIN_IDS: ${TELEGRAM_ADMIN_IDS:-}
    volumes:
      # Persist the JSON stand-in / SQLite fallback across restarts.
      - backend_data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Baked into the client bundle at build time — MUST be the host-facing
        # URL (see the note at the top of this file), not http://backend:8000.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  db_data:
  backend_data:
